name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        # Unit (engines, market-data, web) + integration (api via in-memory
        # MongoDB) + stress. Packages are already built above.
        run: npx vitest run

  deploy:
    name: Deploy (Render)
    needs: build # only deploys if build + every test suite passed
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      # secrets can't be used in `if:`, so surface them via env first.
      - name: Trigger API deploy
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_API }}
        if: env.HOOK != ''
        run: curl -fsS -X POST "$HOOK"
      - name: Trigger web deploy
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_WEB }}
        if: env.HOOK != ''
        run: curl -fsS -X POST "$HOOK"
