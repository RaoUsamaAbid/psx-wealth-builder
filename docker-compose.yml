services:
  redis:
    image: redis:7-alpine
    container_name: psx-redis
    ports:
      - '6379:6379'
    volumes:
      - ./.data/redis:/data
    command: ['redis-server', '--appendonly', 'yes']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: psx-api
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379
    ports:
      - '4000:4000'
    depends_on:
      redis:
        condition: service_healthy
    profiles: ['full']

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: psx-web
    ports:
      - '5173:80'
    depends_on:
      - api
    profiles: ['full']
