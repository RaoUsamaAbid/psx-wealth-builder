# Local full-stack run: docker compose --profile full up --build
# (Day-to-day dev uses `npm run dev`; MongoDB is Atlas via .env.)
services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: psx-api
    env_file:
      - .env
    ports:
      - '4000:4000'
    profiles: ['full']

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: psx-web
    environment:
      API_UPSTREAM: http://api:4000
    ports:
      - '5173:80'
    depends_on:
      - api
    profiles: ['full']
